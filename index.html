<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>计时器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f3;
      --panel: #ffffff;
      --ink: #1e2722;
      --muted: #65706a;
      --line: #dfe5dc;
      --accent: #087f6f;
      --accent-strong: #066456;
      --warning: #b9481f;
      --shadow: 0 18px 42px rgba(30, 39, 34, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(8, 127, 111, 0.14), transparent 34rem),
        linear-gradient(135deg, #f7f8f3 0%, #eef5f1 52%, #f7f8f3 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(760px, 100%);
      display: grid;
      gap: 16px;
    }

    section {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(18px, 4vw, 30px);
      backdrop-filter: blur(12px);
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1,
    h2 {
      font-size: clamp(20px, 4vw, 28px);
      line-height: 1.2;
      font-weight: 750;
      letter-spacing: 0;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      white-space: nowrap;
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .unit {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(12px, 3vw, 18px) 10px;
      background: #fbfcfa;
      text-align: center;
    }

    .value {
      display: block;
      min-height: 1.05em;
      font-variant-numeric: tabular-nums;
      font-size: clamp(30px, 9vw, 64px);
      line-height: 1;
      font-weight: 800;
      color: var(--accent-strong);
    }

    .label {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: clamp(12px, 2.6vw, 15px);
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-bottom: 16px;
    }

    input,
    button {
      min-height: 44px;
      border-radius: 8px;
      font: inherit;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      padding: 10px 12px;
      color: var(--ink);
      background: #fff;
    }

    input:focus {
      border-color: var(--accent);
      outline: 3px solid rgba(8, 127, 111, 0.18);
    }

    button {
      border: 0;
      padding: 0 18px;
      color: #fff;
      background: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-strong);
    }

    .status {
      min-height: 22px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .status.done {
      color: var(--warning);
      font-weight: 700;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 560px) {
      body {
        padding: 14px;
      }

      .section-head,
      .controls {
        display: grid;
      }

      .meta {
        white-space: normal;
      }

      .time-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main aria-label="计时器">
    <section aria-labelledby="elapsed-title">
      <div class="section-head">
        <h1 id="elapsed-title">已经过去</h1>
        <p class="meta">从 2026 年 6 月 16 日 00:00 开始</p>
      </div>
      <div class="time-grid" aria-live="polite">
        <div class="unit">
          <span class="value" id="elapsed-days">0</span>
          <span class="label">天</span>
        </div>
        <div class="unit">
          <span class="value" id="elapsed-hours">00</span>
          <span class="label">小时</span>
        </div>
        <div class="unit">
          <span class="value" id="elapsed-minutes">00</span>
          <span class="label">分钟</span>
        </div>
        <div class="unit">
          <span class="value" id="elapsed-seconds">00</span>
          <span class="label">秒</span>
        </div>
      </div>
    </section>

    <section aria-labelledby="countdown-title">
      <div class="section-head">
        <h2 id="countdown-title">倒计时</h2>
        <p class="meta">选择目标日期时间</p>
      </div>
      <div class="controls">
        <label>
          <span class="sr-only">目标日期时间</span>
          <input id="target-input" type="datetime-local" step="1">
        </label>
        <button id="save-target" type="button">开始倒计时</button>
      </div>
      <div class="time-grid" aria-live="polite">
        <div class="unit">
          <span class="value" id="countdown-days">0</span>
          <span class="label">天</span>
        </div>
        <div class="unit">
          <span class="value" id="countdown-hours">00</span>
          <span class="label">小时</span>
        </div>
        <div class="unit">
          <span class="value" id="countdown-minutes">00</span>
          <span class="label">分钟</span>
        </div>
        <div class="unit">
          <span class="value" id="countdown-seconds">00</span>
          <span class="label">秒</span>
        </div>
      </div>
      <p class="status" id="countdown-status"></p>
    </section>
  </main>

  <script>
    const START_AT = new Date(2026, 5, 16, 0, 0, 0);
    const STORAGE_KEY = "feishu-timer-target";
    const pad = (value) => String(value).padStart(2, "0");

    const elapsedEls = {
      days: document.querySelector("#elapsed-days"),
      hours: document.querySelector("#elapsed-hours"),
      minutes: document.querySelector("#elapsed-minutes"),
      seconds: document.querySelector("#elapsed-seconds")
    };

    const countdownEls = {
      days: document.querySelector("#countdown-days"),
      hours: document.querySelector("#countdown-hours"),
      minutes: document.querySelector("#countdown-minutes"),
      seconds: document.querySelector("#countdown-seconds")
    };

    const targetInput = document.querySelector("#target-input");
    const saveButton = document.querySelector("#save-target");
    const statusEl = document.querySelector("#countdown-status");

    function splitDuration(totalMs) {
      const totalSeconds = Math.max(0, Math.floor(totalMs / 1000));
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      return { days, hours, minutes, seconds };
    }

    function renderTime(parts, els) {
      els.days.textContent = parts.days;
      els.hours.textContent = pad(parts.hours);
      els.minutes.textContent = pad(parts.minutes);
      els.seconds.textContent = pad(parts.seconds);
    }

    function formatInputDate(date) {
      return [
        date.getFullYear(),
        pad(date.getMonth() + 1),
        pad(date.getDate())
      ].join("-") + "T" + [
        pad(date.getHours()),
        pad(date.getMinutes()),
        pad(date.getSeconds())
      ].join(":");
    }

    function readTargetDate() {
      const rawValue = localStorage.getItem(STORAGE_KEY);
      if (!rawValue) return null;

      const date = new Date(rawValue);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function setDefaultTarget() {
      const savedDate = readTargetDate();
      if (savedDate) {
        targetInput.value = formatInputDate(savedDate);
        return;
      }

      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(18, 0, 0, 0);
      targetInput.value = formatInputDate(tomorrow);
    }

    function update() {
      const now = new Date();
      renderTime(splitDuration(now - START_AT), elapsedEls);

      const targetDate = readTargetDate();
      if (!targetDate) {
        renderTime(splitDuration(0), countdownEls);
        statusEl.textContent = "选择时间后点击开始倒计时。";
        statusEl.classList.remove("done");
        return;
      }

      const remaining = targetDate - now;
      renderTime(splitDuration(remaining), countdownEls);

      if (remaining <= 0) {
        statusEl.textContent = "倒计时已结束。";
        statusEl.classList.add("done");
      } else {
        statusEl.textContent = "目标时间：" + targetDate.toLocaleString("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
        statusEl.classList.remove("done");
      }
    }

    saveButton.addEventListener("click", () => {
      if (!targetInput.value) return;
      localStorage.setItem(STORAGE_KEY, new Date(targetInput.value).toISOString());
      update();
    });

    targetInput.addEventListener("change", () => {
      if (!targetInput.value) return;
      localStorage.setItem(STORAGE_KEY, new Date(targetInput.value).toISOString());
      update();
    });

    setDefaultTarget();
    update();
    window.setInterval(update, 1000);
  </script>
</body>
</html>
